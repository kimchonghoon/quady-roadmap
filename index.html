<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#EEF0F6;
  --surface:#FFFFFF;
  --surface2:#F5F7FB;
  --surface3:#EDF2FF;
  --border:#E4E9F2;
  --border2:#C8D3E8;
  --text:#0D1424;
  --text2:#3D5068;
  --muted:#8496AD;
  --teal:#0D9488;
  --teal-light:#CCFBF1;
  --teal-mid:#14B8A6;
  --teal-dark:#0F766E;
  --navy:#0D1424;
  --blue:#2563EB;
  --purple:#7C3AED;
  --amber:#D97706;
  --rose:#BE185D;
  --red:#DC2626;
  --green:#059669;
  --shadow-sm:0 1px 2px rgba(13,20,36,.05),0 1px 3px rgba(13,20,36,.07);
  --shadow:0 2px 8px rgba(13,20,36,.06),0 4px 12px rgba(13,20,36,.05);
  --shadow-lg:0 8px 24px rgba(13,20,36,.09),0 3px 8px rgba(13,20,36,.05);
  --shadow-xl:0 20px 40px rgba(13,20,36,.12),0 8px 16px rgba(13,20,36,.06);
  --shadow-teal:0 4px 14px rgba(13,148,136,.28);
  --r:10px;--r-sm:7px;--r-lg:14px;--r-xl:20px;
}
body{
  font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
  margin:0;
  padding:0;
  width:100%;
  height:100vh;
  overflow:hidden;
}
#root{
  width:100%;
  height:100vh;
  overflow:hidden;
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94A3B8}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade{animation:fadeIn .25s ease}
.slide{animation:slideRight .25s ease}
input,select,textarea{font-family:inherit;font-size:15px}
button{font-family:inherit;cursor:pointer}
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.hov{transition:all .2s cubic-bezier(.2,.8,.2,1);cursor:pointer}
.hov:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--border2)}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.inp{width:100%;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:9px 13px;font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s;background:white;color:var(--text);font-family:inherit}
.inp:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.1)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 17px;border-radius:var(--r-sm);border:none;font-size:13.5px;font-weight:600;transition:all .18s cubic-bezier(.2,.8,.2,1);letter-spacing:.01em;font-family:inherit}
.btn-teal{background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:white;box-shadow:var(--shadow-teal)}
.btn-teal:hover{background:linear-gradient(135deg,var(--teal-mid),var(--teal));box-shadow:0 6px 18px rgba(13,148,136,.38);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-outline{background:white;color:var(--text2);border:1.5px solid var(--border)}
.btn-outline:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-light)}
.progress{height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.modal-bg{position:fixed;inset:0;background:rgba(13,20,36,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(8px);animation:fadeIn .15s ease}
.modal-box{background:white;border-radius:var(--r-xl);width:100%;max-width:720px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:fadeIn .2s ease}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.07em;text-transform:uppercase}
/* ===== AI CHAT SIDEBAR ===== */
.chat-sidebar{
  display:flex;
  flex-direction:column;
  height:100%;
  background:#F8FAFF;
  font-family:inherit;
  border-left:1px solid var(--border);
}
.chat-header{
  padding:14px 16px;
  border-bottom:1px solid rgba(13,148,136,.12);
  background:linear-gradient(160deg,#0A1628 0%,#0D3D38 100%);
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}
.chat-header-icon{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,rgba(13,148,136,.7),rgba(37,99,235,.6));
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.chat-header-text{flex:1;min-width:0}
.chat-header-title{font-size:13.5px;font-weight:700;margin:0;color:white;letter-spacing:.01em}
.chat-header-subtitle{font-size:11px;color:rgba(255,255,255,.45);margin:2px 0 0}
.chat-messages{
  flex:1;
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:transparent;
}
.chat-message{display:flex;margin-bottom:2px}
.chat-message.user{justify-content:flex-end}
.chat-bubble{
  max-width:82%;
  padding:10px 13px;
  border-radius:12px;
  font-size:13px;
  line-height:1.55;
  word-wrap:break-word;
}
.chat-message.user .chat-bubble{
  background:linear-gradient(135deg,var(--teal),var(--teal-dark));
  color:white;
  border-radius:12px 12px 3px 12px;
  box-shadow:0 2px 8px rgba(13,148,136,.2);
}
.chat-message.assistant .chat-bubble{
  background:white;
  color:var(--text);
  border:1px solid var(--border);
  border-radius:3px 12px 12px 12px;
  box-shadow:var(--shadow-sm);
}
.chat-empty{
  text-align:center;
  color:var(--muted);
  padding:28px 14px;
  font-size:12.5px;
  line-height:1.8;
}
.chat-input{
  padding:11px 12px;
  border-top:1px solid var(--border);
  display:flex;
  gap:7px;
  background:white;
  flex-shrink:0;
}
.chat-input textarea{
  flex:1;
  resize:none;
  border:1.5px solid var(--border);
  border-radius:8px;
  padding:8px 11px;
  font-size:13px;
  outline:none;
  min-height:38px;
  font-family:inherit;
  background:var(--surface2);
  color:var(--text);
  transition:border-color .15s,box-shadow .15s;
}
.chat-input textarea:focus{
  border-color:var(--teal);
  background:white;
  box-shadow:0 0 0 3px rgba(13,148,136,.08);
}
.chat-input button{
  padding:8px 13px;
  background:linear-gradient(135deg,var(--teal),var(--teal-dark));
  color:white;
  border-radius:8px;
  font-weight:700;
  font-size:12px;
  cursor:pointer;
  white-space:nowrap;
  transition:all .18s;
  border:none;
  box-shadow:0 2px 6px rgba(13,148,136,.25);
}
.chat-input button:hover:not(:disabled){
  background:linear-gradient(135deg,var(--teal-mid),var(--teal));
  box-shadow:0 4px 12px rgba(13,148,136,.35);
  transform:translateY(-1px);
}
.chat-input button:disabled{
  opacity:.45;
  cursor:not-allowed;
  transform:none;
}

</style>
</head>

/* ─── HELPERS ─── */
const fmt=(n,u)=>{
  if(u==="원"){
    if(n>=100000000)return(n/100000000).toFixed(1)+"억원";
    if(n>=10000)return(n/10000).toFixed(0)+"만원";
    return n.toLocaleString()+"원";
  }
  if(n>=10000)return(n/10000).toFixed(1)+"만"+u;
  return n.toLocaleString()+u;
};
const pct=(c,t)=>t?Math.min(100,Math.round((c/t)*100)):0;
const getProgColor=(p)=>p>=8?"#059669":p>=5?"#D97706":p>=3?"#F97316":"#DC2626";

/* ─── MODAL ─── */
function Modal({children,onClose}){
  useEffect(()=>{document.body.style.overflow="hidden";return()=>{document.body.style.overflow=""}},[]);
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>{children}</div>
    </div>
  );
}

/* ─── PHASE MODAL ─── */

          <div><label className="lbl">종료 (개월차)</label><input type="number" min={1} max={24} value={p.endMonth} onChange={e=>u("endMonth",+e.target.value)} className="inp"/></div>

        </div>
        <div style={{display:"flex",justifyContent:"space-between",paddingTop:16,borderTop:"1px solid var(--border)"}}>

            <button onClick={onClose} className="btn btn-outline">취소</button>

/* ─── HEADER ─── */
function Header({roadmap,totalProg,saving,onAddPhase,onOpenApiSettings,onOpenAiChat}){
  const allTasks=roadmap.phases.flatMap(p=>p.tasks);
  const done=allTasks.filter(t=>t.status==="completed").length;
  const inprog=allTasks.filter(t=>t.status==="in-progress").length;
  const stats=[
    {label:"총 Phase",val:roadmap.phases.length,unit:"개",color:"#A5F3FC"},
    {label:"전체 작업",val:allTasks.length,unit:"건",color:"#BAE6FD"},
    {label:"진행 중",val:inprog,unit:"건",color:"#FDE68A"},
    {label:"완료",val:done,unit:"건",color:"#A7F3D0"},
  ];
  const[goal,setGoal]=useState(()=>localStorage.getItem("quady-focus-goal")||"");
  const[editingGoal,setEditingGoal]=useState(false);
  const[goalDraft,setGoalDraft]=useState("");
  const goalInputRef=useRef(null);

  const startEditGoal=()=>{
    setGoalDraft(goal);
    setEditingGoal(true);
    setTimeout(()=>goalInputRef.current?.focus(),50);
  };
  const saveGoal=()=>{
    const v=goalDraft.trim();
    setGoal(v);
    localStorage.setItem("quady-focus-goal",v);
    setEditingGoal(false);
  };

  return(
    <div style={{background:"linear-gradient(160deg,#08111F 0%,#0C2340 55%,#093830 100%)",color:"white",padding:"10px 18px",flexShrink:0,borderBottom:"1px solid rgba(255,255,255,.06)"}}>
      {/* 1행: 로고 + 제목 + 버튼 */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
        <div style={{width:32,height:32,borderRadius:9,background:"linear-gradient(135deg,#0D9488,#1D4ED8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,flexShrink:0,boxShadow:"0 3px 10px rgba(13,148,136,.45)",letterSpacing:"-.5px"}}>Q</div>
        <div style={{flex:1,minWidth:0}}>
          <h1 style={{fontSize:14.5,fontWeight:800,margin:0,lineHeight:1.2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",letterSpacing:"-.01em"}}>{roadmap.title}</h1>
          <p style={{fontSize:10.5,opacity:.4,margin:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",letterSpacing:".01em"}}>{roadmap.subtitle}</p>
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
          <button onClick={()=>window.print()} style={{padding:"4px 9px",background:"rgba(255,255,255,.07)",color:"rgba(255,255,255,.7)",border:"1px solid rgba(255,255,255,.12)",borderRadius:6,fontSize:11.5,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.12)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,.07)"}>🖨️ 인쇄</button>
          <button onClick={onOpenApiSettings} style={{padding:"4px 9px",background:"rgba(255,255,255,.07)",color:"rgba(255,255,255,.7)",border:"1px solid rgba(255,255,255,.12)",borderRadius:6,fontSize:11.5,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.12)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,.07)"}>🔑 AI 키</button>
          <button onClick={onAddPhase} style={{padding:"4px 10px",background:"rgba(13,148,136,.25)",color:"#5EEAD4",border:"1px solid rgba(13,148,136,.35)",borderRadius:6,fontSize:11.5,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(13,148,136,.35)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(13,148,136,.25)"}>+ Phase</button>
        </div>
        <div style={{fontSize:10,opacity:.28,flexShrink:0,letterSpacing:".02em"}}>업데이트: {roadmap.lastUpdated}{saving?" · 저장 중…":""}</div>
      </div>

      {/* 2행: 통계 + 진행률 */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
        {stats.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:5,background:"rgba(255,255,255,.05)",borderRadius:8,padding:"5px 11px",border:"1px solid rgba(255,255,255,.07)",backdropFilter:"blur(4px)"}}>
            <span style={{fontSize:17,fontWeight:800,color:s.color,lineHeight:1,letterSpacing:"-.02em"}}>{s.val}</span>
            <div style={{display:"flex",flexDirection:"column",gap:0}}>
              <span style={{fontSize:9,opacity:.7,lineHeight:1.2,letterSpacing:".02em"}}>{s.unit}</span>
              <span style={{fontSize:9,opacity:.4,lineHeight:1.2,letterSpacing:".02em"}}>{s.label}</span>
            </div>
          </div>
        ))}
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10.5,marginBottom:4}}>
            <span style={{opacity:.4,letterSpacing:".02em"}}>전체 진행률</span>
            <span style={{fontWeight:800,color:"#34D399",letterSpacing:"-.01em"}}>{totalProg*10}%</span>
          </div>
          <div style={{height:5,background:"rgba(255,255,255,.08)",borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${totalProg*10}%`,background:"linear-gradient(90deg,#10B981,#34D399)",borderRadius:3,transition:"width .6s cubic-bezier(.4,0,.2,1)",boxShadow:"0 0 8px rgba(52,211,153,.4)"}}/>
          </div>
        </div>
      </div>

      {/* 3행: 시즌 집중 목표 */}
      <div style={{borderTop:"1px solid rgba(255,255,255,.07)",paddingTop:7}}>
        {editingGoal?(
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:12,flexShrink:0}}>🎯</span>
            <input ref={goalInputRef} value={goalDraft} onChange={e=>setGoalDraft(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")saveGoal();if(e.key==="Escape")setEditingGoal(false);}}
              placeholder="이번 시즌 집중 목표를 입력하세요..."
              style={{flex:1,background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.25)",borderRadius:7,padding:"5px 10px",color:"white",fontSize:12.5,outline:"none",fontFamily:"inherit"}}
            />
            <button onClick={saveGoal} style={{padding:"4px 11px",background:"linear-gradient(135deg,#0D9488,#0F766E)",color:"white",border:"none",borderRadius:6,fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0,fontFamily:"inherit"}}>저장</button>
            <button onClick={()=>setEditingGoal(false)} style={{padding:"4px 8px",background:"rgba(255,255,255,.08)",color:"rgba(255,255,255,.6)",border:"none",borderRadius:6,fontSize:12,cursor:"pointer",flexShrink:0,fontFamily:"inherit"}}>취소</button>
          </div>
        ):(
          <div onClick={startEditGoal} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"3px 6px",borderRadius:6,transition:"background .15s"}}
            onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.05)"}
            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <span style={{fontSize:12,flexShrink:0}}>🎯</span>
            {goal?(
              <span style={{fontSize:12.5,fontWeight:600,color:"#6EE7B7",letterSpacing:".01em",flex:1}}>{goal}</span>
            ):(
              <span style={{fontSize:11.5,opacity:.3,fontStyle:"italic",flex:1}}>클릭해서 이번 시즌 집중 목표를 입력하세요...</span>
            )}
            <span style={{fontSize:10,opacity:.25,flexShrink:0}}>✏️</span>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── TIMELINE VIEW ─── */
function TimelineView({roadmap,zoom,onEditTask,onEditPhase,onAddTask}){
  const[showAdd,setShowAdd]=useState(null);
  const[newTitle,setNewTitle]=useState("");
  const cfg=ZOOMS[zoom];
  const COL=cfg.col;
  const maxMonth=useMemo(()=>{
    let m=0;
    roadmap.phases.forEach(p=>{if(p.endMonth>m)m=p.endMonth;p.tasks.forEach(t=>{if(t.endMonth>m)m=t.endMonth;});});
    return Math.max(m+2,24);
  },[roadmap]);

  const headerCells=useMemo(()=>{
    const cells=[];
    const gs=cfg.group;
    const total=Math.ceil(maxMonth/gs)*gs;
    for(let i=0;i<total;i+=gs)cells.push({start:i,width:gs*COL,label:cfg.hdr(i)});
    return cells;
  },[maxMonth,zoom,COL]);

  const totalCols=headerCells.length>0?headerCells[headerCells.length-1].start+cfg.group:maxMonth;
  const mToPx=m=>(m-1)*COL;
  const spanPx=(s,e)=>Math.max((e-s+1)*COL-4,14);
  const curMonth=2; // current month indicator

  const addTask=(phaseId)=>{
    if(!newTitle.trim())return;
    const ph=roadmap.phases.find(p=>p.id===phaseId);
    onAddTask(phaseId,newTitle.trim(),ph.startMonth,ph.endMonth);
    setNewTitle("");setShowAdd(null);
  };

  return(
    <div style={{padding:"20px 24px",maxWidth:1280,margin:"0 auto"}}>
      <div style={{overflowX:"auto",overflowY:"auto",maxHeight:"calc(100vh - 200px)",paddingBottom:16,borderRadius:12,border:"1px solid var(--border)",background:"white",boxShadow:"var(--shadow-sm)"}}>
        <div style={{minWidth:Math.max(totalCols*COL+230,700)}}>
          {/* Sticky header row */}
          <div style={{position:"sticky",top:0,zIndex:20,background:"white",borderBottom:"2px solid var(--border)",display:"flex",boxShadow:"0 2px 6px rgba(0,0,0,.06)"}}>
            <div style={{width:230,flexShrink:0,background:"white",padding:"8px 12px",display:"flex",alignItems:"center"}}>
              <span style={{fontSize:12,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".06em"}}>작업 항목</span>
            </div>
            {headerCells.map((cell,ci)=>(
              <div key={ci} style={{width:cell.width,flexShrink:0,textAlign:"center",fontSize:13,fontWeight:700,color:ci%2===0?"var(--text2)":"var(--muted)",padding:"8px 0",background:ci%2===0?"white":"#FAFBFC",letterSpacing:".04em",borderLeft:"1px solid #F1F5F9"}}>
                {cell.label}
              </div>
            ))}
          </div>

          {/* Grid body */}
          <div style={{position:"relative",paddingTop:4}}>
            {/* Vertical grid lines */}
            <div style={{position:"absolute",top:0,bottom:0,left:210,right:0,display:"flex",pointerEvents:"none",zIndex:0}}>
              {Array.from({length:totalCols},(_,i)=>(
                <div key={i} style={{width:COL,flexShrink:0,height:"100%",borderLeft:i%cfg.group===0?"1px solid #E2E8F0":"1px solid #F8FAFC"}}/>
              ))}
            </div>
            {/* Current month indicator */}
            <div style={{position:"absolute",top:0,bottom:0,left:210+mToPx(curMonth),width:2,background:"rgba(220,38,38,.3)",zIndex:5,pointerEvents:"none"}}>
              <div style={{position:"absolute",top:-2,left:-18,background:"#DC2626",color:"white",fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:3,whiteSpace:"nowrap"}}>현재</div>
            </div>

            {roadmap.phases.map(phase=>(
              <div key={phase.id} style={{marginBottom:20,position:"relative",zIndex:1}}>
                {/* Phase header row */}
                <div style={{display:"flex",alignItems:"center",marginBottom:4,background:phase.color+"06",borderRadius:6}}>
                  <div onClick={()=>onEditPhase(phase)} style={{width:230,flexShrink:0,display:"flex",alignItems:"center",gap:10,cursor:"pointer",paddingRight:10,paddingTop:4,paddingBottom:4,paddingLeft:6,position:"sticky",left:0,background:phase.color+"06",zIndex:2,borderRadius:6}}>
                    <div style={{width:34,height:34,borderRadius:9,background:phase.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,border:`1px solid ${phase.color}30`,flexShrink:0}}>{phase.icon}</div>
                    <div style={{overflow:"hidden"}}>
                      <div style={{fontSize:14,fontWeight:700,color:phase.color,lineHeight:1.3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{phase.name}</div>
                      <div style={{fontSize:12,color:"var(--muted)"}}>{phase.period}</div>
                    </div>
                  </div>
                  <div style={{position:"relative",flex:1,height:28}}>
                    <div style={{position:"absolute",left:mToPx(phase.startMonth)+1,width:spanPx(phase.startMonth,phase.endMonth),height:28,background:phase.color+"12",borderRadius:6,border:`1.5px solid ${phase.color}25`}}>
                      {spanPx(phase.startMonth,phase.endMonth)>80&&<div style={{fontSize:12,color:phase.color,fontWeight:700,padding:"0 10px",lineHeight:"28px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",opacity:.8}}>{phase.milestone}</div>}
                    </div>
                  </div>
                </div>

                {/* Task rows */}
                {phase.tasks.map(task=>{
                  const sc=STATUS[task.status];
                  const bw=spanPx(task.startMonth,task.endMonth);
                  const isComp=task.status==="completed";
                  const isInprog=task.status==="in-progress";
                  const isBlock=task.status==="blocked";
                  return(
                    <div key={task.id} style={{display:"flex",alignItems:"center",marginBottom:4}}>
                      <div onClick={()=>onEditTask({task,phase})} style={{width:230,flexShrink:0,paddingLeft:44,paddingRight:8,fontSize:13,color:"var(--text2)",cursor:"pointer",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",lineHeight:"24px",display:"flex",alignItems:"center",gap:6,position:"sticky",left:0,background:"white",zIndex:1}} title={task.title}>
                        <span style={{width:7,height:7,borderRadius:"50%",background:sc.dot,flexShrink:0}}/>
                        <span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{task.title}</span>
                      </div>
                      <div style={{position:"relative",flex:1,height:24}}>
                        <div onClick={()=>onEditTask({task,phase})} title={`${task.title} · ${task.progress}/10점 · ${task.startMonth}~${task.endMonth}개월차`}
                          style={{position:"absolute",left:mToPx(task.startMonth)+2,width:bw,height:22,borderRadius:6,cursor:"pointer",transition:"all .15s",
                            background:isComp?phase.color:isInprog?`${phase.color}CC`:isBlock?"#EF4444AA":`${phase.color}30`,
                            display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,
                            color:isComp||isInprog||isBlock?"white":phase.color,fontWeight:700,
                            boxShadow:isInprog?`0 2px 8px ${phase.color}44`:"none",
                          }}>
                          {bw>44&&`${task.progress}/10`}
                          {isInprog&&<span style={{position:"absolute",top:3,right:3,width:5,height:5,borderRadius:"50%",background:"rgba(255,255,255,.85)",animation:"pulse 1.5s infinite"}}/>}
                        </div>
                      </div>
                    </div>
                  );
                })}

                {/* Add task row */}
                <div style={{display:"flex",alignItems:"center"}}>
                  <div style={{width:210,flexShrink:0,paddingLeft:36}}>
                    {showAdd===phase.id?(
                      <div style={{display:"flex",gap:4}}>
                        <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask(phase.id)} placeholder="항목명..." autoFocus style={{width:110,fontSize:15,border:"1px solid var(--border2)",borderRadius:4,padding:"3px 6px",outline:"none"}}/>
                        <button onClick={()=>addTask(phase.id)} style={{background:phase.color,color:"white",border:"none",borderRadius:4,padding:"2px 7px",cursor:"pointer",fontSize:15}}>+</button>
                        <button onClick={()=>{setShowAdd(null);setNewTitle("");}} style={{background:"var(--surface2)",border:"none",borderRadius:4,padding:"2px 5px",cursor:"pointer",fontSize:15}}>×</button>
                      </div>
                    ):(
                      <button onClick={()=>setShowAdd(phase.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:15,color:"var(--muted)",padding:0}}>+ 추가</button>
                    )}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
      {/* Legend - sticky bottom */}
      <div style={{position:"sticky",bottom:0,background:"white",borderTop:"1px solid var(--border)",display:"flex",gap:16,padding:"10px 16px",flexWrap:"wrap",alignItems:"center",zIndex:10,boxShadow:"0 -2px 8px rgba(0,0,0,.05)"}}>
        {Object.entries(STATUS).map(([k,v])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:5,fontSize:15,color:"var(--text2)"}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:v.dot,display:"inline-block"}}/>
            {v.label}
          </div>
        ))}
        <span style={{marginLeft:"auto",fontSize:15,color:"var(--muted)"}}>바 안의 숫자 = 진행도(0-10점) · 빨간 점선 = 현재 시점</span>
      </div>
    </div>
  );
}

/* ─── DETAIL VIEW ─── */
function DetailView({roadmap,activePhase,setActivePhase,onEditTask,onEditPhase,filterStatus,filterPriority,searchQuery,onAddTask,onOpenWorkspace,onReorderTask,onReorderPhase}){
  const[showAdd,setShowAdd]=useState(false);
  const[newTitle,setNewTitle]=useState("");
  const curPhase=activePhase?roadmap.phases.find(p=>p.id===activePhase):null;

  const filterTasks=tasks=>tasks.filter(t=>{
    const ms=filterStatus==="all"||t.status===filterStatus;
    const mp=filterPriority==="all"||t.priority===filterPriority;
    const mq=!searchQuery||t.title.toLowerCase().includes(searchQuery.toLowerCase())||t.assignee.toLowerCase().includes(searchQuery.toLowerCase());
    return ms&&mp&&mq;
  });

  return(
    <div style={{maxWidth:1280,margin:"0 auto",padding:"0 24px 80px"}}>
      {/* Phase tabs */}
      <div style={{display:"flex",overflowX:"auto",gap:6,padding:"16px 0 14px",borderBottom:"1px solid var(--border)"}}>
        {roadmap.phases.map(p=>{
          const ft=filterTasks(p.tasks);
          const comp=ft.filter(t=>t.status==="completed").length;
          const pct2=ft.length?Math.round((comp/ft.length)*100):0;
          const isActive=activePhase===p.id;
          const phaseIdx=roadmap.phases.findIndex(pp=>pp.id===p.id);
          return(
            <div key={p.id} style={{flexShrink:0,display:"flex",alignItems:"center",gap:2}}>
              <button onClick={()=>setActivePhase(p.id)}
                style={{padding:"8px 14px",background:isActive?p.color+"10":"transparent",border:isActive?`1.5px solid ${p.color}40`:"1.5px solid transparent",borderRadius:6,cursor:"pointer",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap",transition:"all .15s"}}>
                <span style={{fontSize:14}}>{p.icon}</span>
                <span style={{fontSize:14,fontWeight:isActive?700:400,color:isActive?p.color:"var(--text2)"}}>{p.name}</span>
                <span className="tag" style={{background:isActive?p.color:"var(--border)",color:isActive?"white":"var(--muted)",fontSize:14}}>{pct2}%</span>
              </button>
              <div style={{display:"flex",flexDirection:"column",gap:1}}>
                <button onClick={()=>onReorderPhase(p.id,-1)} disabled={phaseIdx===0}
                  title="Phase 위로" style={{padding:"2px 5px",border:"1px solid var(--border)",borderRadius:3,cursor:phaseIdx===0?"default":"pointer",fontSize:11,lineHeight:1,background:"white",color:phaseIdx===0?"var(--border)":"var(--text2)",opacity:phaseIdx===0?.35:1}}>▲</button>
                <button onClick={()=>onReorderPhase(p.id,1)} disabled={phaseIdx===roadmap.phases.length-1}
                  title="Phase 아래로" style={{padding:"2px 5px",border:"1px solid var(--border)",borderRadius:3,cursor:phaseIdx===roadmap.phases.length-1?"default":"pointer",fontSize:11,lineHeight:1,background:"white",color:phaseIdx===roadmap.phases.length-1?"var(--border)":"var(--text2)",opacity:phaseIdx===roadmap.phases.length-1?.35:1}}>▼</button>
              </div>
            </div>
          );
        })}
      </div>

      {curPhase&&(
        <div style={{paddingTop:20}} className="fade">
          {/* Phase header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,background:"white",borderRadius:10,padding:"16px 20px",border:"1px solid #E2E8F0",boxShadow:"0 1px 3px rgba(0,0,0,.06)",borderLeft:`4px solid ${curPhase.color}`}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <span style={{fontSize:22}}>{curPhase.icon}</span>
                <h2 style={{fontSize:20,fontWeight:800,color:curPhase.color}}>{curPhase.name}</h2>
                <span className="tag" style={{background:curPhase.color+"15",color:curPhase.color}}>{curPhase.period}</span>
              </div>
              {curPhase.objective&&<p style={{fontSize:15,color:"var(--text2)",marginBottom:6}}>{curPhase.objective}</p>}
              {curPhase.milestone&&<div style={{display:"flex",alignItems:"center",gap:6,fontSize:14,color:"var(--muted)"}}>🏁 <span>{curPhase.milestone}</span></div>}
            </div>
            <button onClick={()=>onEditPhase(curPhase)} className="btn btn-outline" style={{fontSize:14,flexShrink:0}}>편집</button>
          </div>

          {/* Task list */}
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {filterTasks(curPhase.tasks).map(function(task){
              const sc=STATUS[task.status];
              const pc=PRIORITY[task.priority];
              const checkDone=task.checklist.filter(function(c){return c.done;}).length;
              const taskIdx=curPhase.tasks.findIndex(function(t){return t.id===task.id;});
              const isFirst=taskIdx===0;
              const isLast=taskIdx===curPhase.tasks.length-1;
              const btnBase={width:32,height:32,border:"1.5px solid #CBD5E1",borderRadius:6,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",background:"white",color:"#64748B",fontWeight:700,transition:"all .15s",flexShrink:0};
              const btnDisabled={...btnBase,opacity:0.25,cursor:"default",color:"#CBD5E1"};
              return(
                <div key={task.id} style={{display:"flex",flexDirection:"row",gap:8,alignItems:"center"}}>
                  {/* ▲▼ 순서 버튼 */}
                  <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}} onClick={function(e){e.stopPropagation();}}>
                    <button
                      style={isFirst ? btnDisabled : btnBase}
                      disabled={isFirst}
                      title="위로 이동"
                      onClick={function(e){e.stopPropagation();if(!isFirst)onReorderTask(curPhase.id,task.id,-1);}}
                      onMouseEnter={function(e){if(!isFirst){e.currentTarget.style.background=curPhase.color;e.currentTarget.style.color="white";e.currentTarget.style.borderColor=curPhase.color;}}}
                      onMouseLeave={function(e){if(!isFirst){e.currentTarget.style.background="white";e.currentTarget.style.color="#64748B";e.currentTarget.style.borderColor="#CBD5E1";}}}>
                      ▲
                    </button>
                    <button
                      style={isLast ? btnDisabled : btnBase}
                      disabled={isLast}
                      title="아래로 이동"
                      onClick={function(e){e.stopPropagation();if(!isLast)onReorderTask(curPhase.id,task.id,1);}}
                      onMouseEnter={function(e){if(!isLast){e.currentTarget.style.background=curPhase.color;e.currentTarget.style.color="white";e.currentTarget.style.borderColor=curPhase.color;}}}
                      onMouseLeave={function(e){if(!isLast){e.currentTarget.style.background="white";e.currentTarget.style.color="#64748B";e.currentTarget.style.borderColor="#CBD5E1";}}}>
                      ▼
                    </button>
                  </div>
                  {/* 카드 */}
                  <div className="card hov" onClick={function(){onEditTask({task,phase:curPhase});}} style={{overflow:"hidden",flex:1}}>
                    <div style={{padding:"16px 18px",borderLeft:"4px solid "+curPhase.color,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
                      <div style={{flex:1,minWidth:0}}>
                        <h3 style={{fontSize:16,fontWeight:700,lineHeight:1.3,marginBottom:8}}>{task.title}</h3>
                        <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",fontSize:13,color:"var(--muted)",marginBottom:10}}>
                          <span>📅 {task.startMonth}~{task.endMonth}개월차</span>
                          {task.deadline&&<span>⏰ {task.deadline}</span>}
                          {task.assignee&&<span>👤 {task.assignee}</span>}
                          {task.kpi&&<span style={{color:curPhase.color,fontWeight:600}}>🎯 {task.kpi}</span>}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{width:120,height:7,background:"var(--border)",borderRadius:4,overflow:"hidden"}}>
                            <div style={{height:"100%",width:(task.progress*10)+"%",background:getProgColor(task.progress),borderRadius:4,transition:"width .3s"}}/>
                          </div>
                          <span style={{fontSize:14,fontWeight:700,color:getProgColor(task.progress)}}>{task.progress}/10</span>
                          {task.checklist.length>0&&<span style={{fontSize:13,color:"var(--muted)",marginLeft:4}}>체크 {checkDone}/{task.checklist.length}</span>}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:5,flexDirection:"column",alignItems:"flex-end",flexShrink:0}}>
                        <span className="tag" style={{background:pc.bg,color:pc.color}}>{pc.label}</span>
                        <span className="tag" style={{background:sc.bg,color:sc.text}}>{sc.label}</span>
                        <button onClick={function(e){e.stopPropagation();onOpenWorkspace({task,phase:curPhase});}}
                          style={{padding:"5px 10px",border:"1.5px solid "+curPhase.color+"40",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:700,background:curPhase.color+"10",color:curPhase.color,marginTop:2,whiteSpace:"nowrap",transition:"all .15s"}}
                          onMouseEnter={function(e){e.currentTarget.style.background=curPhase.color;e.currentTarget.style.color="white";}}
                          onMouseLeave={function(e){e.currentTarget.style.background=curPhase.color+"10";e.currentTarget.style.color=curPhase.color;}}>
                          📂 작업
                        </button>
                      </div>
                    </div>
                    {task.details.length>0&&(
                      <div style={{padding:"0 16px 10px 20px",borderTop:"1px solid #F8FAFC"}}>
                        {task.details.slice(0,3).map(function(d,i){return(
                          <div key={i} style={{fontSize:14,color:"var(--text2)",padding:"2px 0",display:"flex",gap:5}}>
                            <span style={{color:curPhase.color,opacity:0.4,flexShrink:0}}>▸</span>{d}
                          </div>
                        );})}
                        {task.details.length>3&&<div style={{fontSize:15,color:"var(--muted)",marginTop:2}}>+{task.details.length-3}개 더보기...</div>}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}

            {showAdd?(
              <div className="card" style={{padding:14}}>
                <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){onAddTask(curPhase.id,newTitle.trim(),curPhase.startMonth,curPhase.endMonth);setNewTitle("");setShowAdd(false);}}} placeholder="새 항목 제목..." className="inp" autoFocus style={{marginBottom:10}}/>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{onAddTask(curPhase.id,newTitle.trim(),curPhase.startMonth,curPhase.endMonth);setNewTitle("");setShowAdd(false);}} className="btn btn-teal" style={{background:curPhase.color}}>추가</button>
                  <button onClick={()=>setShowAdd(false)} className="btn btn-outline">취소</button>
                </div>
              </div>
            ):(
              <button onClick={()=>setShowAdd(true)} className="card" style={{padding:14,width:"100%",border:"2px dashed var(--border2)",background:"transparent",cursor:"pointer",color:"var(--muted)",fontSize:15,fontWeight:500,textAlign:"center",transition:"all .15s"}}>
                + 새 항목 추가
              </button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── DASHBOARD VIEW ─── */
function DashboardView({roadmap,totalProg,onEditTask,setView,setActivePhase,filterStatus}){
  const allTasks=roadmap.phases.flatMap(p=>p.tasks);
  const completed=allTasks.filter(t=>t.status==="completed").length;
  const inprog=allTasks.filter(t=>t.status==="in-progress").length;
  const blocked=allTasks.filter(t=>t.status==="blocked").length;
  const highPriCount=allTasks.filter(t=>t.priority==="high"&&t.status!=="completed").length;

  const inProgTasks=allTasks.filter(t=>t.status==="in-progress").slice(0,6);
  const highPri=allTasks.filter(t=>t.priority==="high"&&t.status!=="completed").slice(0,8);

  // 담당자별 집계
  const assigneeMap={};
  allTasks.forEach(t=>{
    const a=t.assignee||"미배정";
    if(!assigneeMap[a])assigneeMap[a]={total:0,done:0,inprog:0,blocked:0};
    assigneeMap[a].total++;
    if(t.status==="completed")assigneeMap[a].done++;
    else if(t.status==="in-progress")assigneeMap[a].inprog++;
    else if(t.status==="blocked")assigneeMap[a].blocked++;
  });
  const assignees=Object.entries(assigneeMap).sort((a,b)=>b[1].total-a[1].total);

  const sectionLabel={fontSize:11,fontWeight:700,color:"var(--muted)",letterSpacing:".07em",textTransform:"uppercase",margin:"0 0 12px"};
  const card={background:"white",borderRadius:14,border:"1px solid var(--border)",boxShadow:"var(--shadow-sm)"};

  return(
    <div style={{padding:"16px 16px",display:"flex",flexDirection:"column",gap:14,height:"100%",overflowY:"auto"}} className="fade">

      {/* ── 상단: 요약 지표 ── */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        {[
          {label:"전체 진행률",val:`${totalProg*10}%`,icon:"📈",color:"#0D9488",bg:"linear-gradient(135deg,#0D9488,#0F766E)",sub:`${allTasks.length}개 작업`},
          {label:"완료",val:completed,icon:"✅",color:"#059669",bg:"linear-gradient(135deg,#059669,#047857)",sub:`전체의 ${allTasks.length?Math.round(completed/allTasks.length*100):0}%`},
          {label:"진행 중",val:inprog,icon:"⚡",color:"#2563EB",bg:"linear-gradient(135deg,#2563EB,#1D4ED8)",sub:"활성 작업"},
          {label:"주의 필요",val:blocked+highPriCount,icon:"🔴",color:"#DC2626",bg:"linear-gradient(135deg,#DC2626,#B91C1C)",sub:`보류 ${blocked} · 고우선 ${highPriCount}`},
        ].map((s,i)=>(
          <div key={i} style={{...card,padding:"14px 16px",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,right:0,width:60,height:60,borderRadius:"0 14px 0 60px",background:s.bg,opacity:.08}}/>
            <div style={{fontSize:20,marginBottom:6}}>{s.icon}</div>
            <div style={{fontSize:11,color:"var(--muted)",fontWeight:700,letterSpacing:".05em",textTransform:"uppercase",marginBottom:4}}>{s.label}</div>
            <div style={{fontSize:28,fontWeight:800,color:s.color,lineHeight:1,letterSpacing:"-.02em"}}>{s.val}</div>
            <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* ── 중단: Phase 현황 + 오른쪽 패널 ── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:12,minHeight:0}}>

        {/* Phase 진행 현황 */}
        <div style={{...card,padding:"16px 18px",display:"flex",flexDirection:"column",gap:0}}>
          <p style={sectionLabel}>Phase 진행 현황</p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {roadmap.phases.map(phase=>{
              const ft=phase.tasks;
              const avg=ft.length?Math.round(ft.reduce((s,t)=>s+(t.progress||0),0)/ft.length):0;
              const comp=ft.filter(t=>t.status==="completed").length;
              const inp=ft.filter(t=>t.status==="in-progress").length;
              const blk=ft.filter(t=>t.status==="blocked").length;
              const pct=avg*10;
              return(
                <div key={phase.id} onClick={()=>{setView("detail");setActivePhase(phase.id);}}
                  style={{padding:"10px 12px",borderRadius:10,border:"1px solid var(--border)",cursor:"pointer",transition:"all .18s",background:"white"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=phase.color;e.currentTarget.style.background=phase.color+"08";e.currentTarget.style.transform="translateX(2px)";}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.background="white";e.currentTarget.style.transform="none";}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
                    <div style={{width:28,height:28,borderRadius:7,background:phase.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{phase.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:700,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{phase.name}</div>
                      <div style={{fontSize:11,color:"var(--muted)"}}>{phase.period}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:17,fontWeight:800,color:getProgColor(avg),lineHeight:1}}>{pct}%</div>
                      <div style={{fontSize:10,color:"var(--muted)",marginTop:1}}>완료 {comp}/{ft.length}</div>
                    </div>
                  </div>
                  {/* 진행바 */}
                  <div style={{height:5,background:"var(--border)",borderRadius:3,overflow:"hidden",marginBottom:5}}>
                    <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${phase.color}99,${phase.color})`,borderRadius:3,transition:"width .5s"}}/>
                  </div>
                  {/* 상태 칩 */}
                  <div style={{display:"flex",gap:4}}>
                    {inp>0&&<span style={{fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:10,background:"#DBEAFE",color:"#1D4ED8"}}>진행 {inp}</span>}
                    {comp>0&&<span style={{fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:10,background:"#D1FAE5",color:"#065F46"}}>완료 {comp}</span>}
                    {blk>0&&<span style={{fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:10,background:"#FEE2E2",color:"#991B1B"}}>보류 {blk}</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* 오른쪽: 담당자 현황 + 진행 중 작업 */}

                        <div style={{height:"100%",width:`${task.progress*10}%`,background:ph?.color||"var(--teal)",borderRadius:2}}/>
                      </div>
                      <span style={{fontSize:10,fontWeight:700,color:ph?.color||"var(--teal)"}}>{task.progress*10}%</span>
                    </div>
                  </div>

      )}
    </div>
  );
}

/* ─── MEETING VIEW ─── */
function MeetingView({roadmap}){
  const SKEY='quady-meetings-v1';
  const[meetings,setMeetings]=useState(()=>{try{return JSON.parse(localStorage.getItem(SKEY))||[];}catch{return[];}});
  const[selId,setSelId]=useState(null);
  const[search,setSearch]=useState('');
  const sel=meetings.find(m=>m.id===selId)||null;

  const save=(updated)=>{setMeetings(updated);localStorage.setItem(SKEY,JSON.stringify(updated));};

  const createMeeting=()=>{
    const m={
      id:`m-${Date.now()}`,
      title:'새 회의',
      date:new Date().toISOString().split('T')[0],
      participants:'',
      phaseId:'',
      agenda:'',
      content:'',
      decisions:'',
      actions:[],
      createdAt:Date.now(),
    };
    const updated=[m,...meetings];
    save(updated);
    setSelId(m.id);
  };

  const update=(field,value)=>save(meetings.map(m=>m.id===selId?{...m,[field]:value}:m));

  const deleteMeeting=(id)=>{
    if(!window.confirm('이 회의록을 삭제하시겠습니까?'))return;
    save(meetings.filter(m=>m.id!==id));
    if(selId===id)setSelId(null);
  };

  const addAction=()=>update('actions',[...(sel.actions||[]),{id:`a-${Date.now()}`,task:'',assignee:'',due:'',done:false}]);
  const updateAction=(idx,field,val)=>{const a=[...(sel.actions||[])];a[idx]={...a[idx],[field]:val};update('actions',a);};
  const deleteAction=(idx)=>{const a=[...(sel.actions||[])];a.splice(idx,1);update('actions',a);};

  const filtered=meetings.filter(m=>m.title.includes(search)||m.date.includes(search)||(m.participants||'').includes(search));

  const fieldStyle={width:'100%',border:'1.5px solid var(--border)',borderRadius:8,padding:'8px 12px',fontSize:14,outline:'none',fontFamily:'inherit',background:'white',color:'var(--text)',lineHeight:1.6,transition:'border .15s'};

  return(
    <div style={{display:'flex',flex:1,overflow:'hidden',background:'var(--bg)'}}>

      {/* ─── 좌측: 회의 목록 ─── */}
      <div style={{width:240,flexShrink:0,display:'flex',flexDirection:'column',background:'white',borderRight:'1px solid var(--border)',overflow:'hidden'}}>
        <div style={{padding:'14px 12px',borderBottom:'1px solid var(--border)',display:'flex',flexDirection:'column',gap:8}}>
          <button onClick={createMeeting}
            style={{width:'100%',padding:'8px',background:'var(--teal)',color:'white',border:'none',borderRadius:8,fontSize:13,fontWeight:700,cursor:'pointer'}}>
            + 새 회의록
          </button>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 검색..."
            style={{...fieldStyle,padding:'6px 10px',fontSize:13}}/>
        </div>
        <div style={{flex:1,overflowY:'auto'}}>
          {filtered.length===0&&(
            <div style={{padding:32,textAlign:'center',color:'var(--muted)',fontSize:13,lineHeight:1.8}}>
              📋<br/>회의록이 없습니다.<br/>새 회의록을 만들어보세요!
            </div>
          )}
          {filtered.map(m=>{
            const phase=roadmap.phases.find(p=>p.id===m.phaseId);
            const doneActions=(m.actions||[]).filter(a=>a.done).length;
            const totalActions=(m.actions||[]).length;
            return(
              <div key={m.id} onClick={()=>setSelId(m.id)}
                style={{padding:'12px 14px',borderBottom:'1px solid var(--border)',cursor:'pointer',background:selId===m.id?'var(--teal-light)':'transparent',borderLeft:selId===m.id?'3px solid var(--teal)':'3px solid transparent',transition:'all .15s'}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:6}}>
                  <p style={{margin:0,fontSize:13,fontWeight:selId===m.id?700:500,color:'var(--text)',lineHeight:1.3,wordBreak:'break-word'}}>{m.title}</p>
                  <button onClick={e=>{e.stopPropagation();deleteMeeting(m.id);}}
                    style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:14,padding:0,flexShrink:0,opacity:.5}}>×</button>
                </div>
                <p style={{margin:'4px 0 0',fontSize:11,color:'var(--muted)'}}>{m.date}</p>
                {m.participants&&<p style={{margin:'2px 0 0',fontSize:11,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>👥 {m.participants}</p>}
                <div style={{display:'flex',gap:6,marginTop:4}}>
                  {phase&&<span style={{fontSize:10,padding:'1px 6px',background:phase.color+'22',color:phase.color,borderRadius:10,fontWeight:600}}>{phase.name.split(' ')[0]}</span>}
                  {totalActions>0&&<span style={{fontSize:10,padding:'1px 6px',background:'var(--surface2)',color:'var(--text2)',borderRadius:10}}>{doneActions}/{totalActions} 완료</span>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ─── 우측: 편집 영역 ─── */}
      {sel?(
        <div style={{flex:1,overflowY:'auto',padding:'24px 28px'}}>
          {/* 제목 */}

/* ─── AI CHAT SIDEBAR ─── */
function AIChatModal({roadmap,onClose}){
  const[messages,setMessages]=useState([]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const chatEndRef=useRef(null);

  const scrollToBottom=()=>{
    setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:"smooth"}),100);
  };

  useEffect(()=>scrollToBottom(),[messages]);

  const sendMessage=async(userMsg)=>{
    if(!userMsg.trim())return;
    
    const apiKey=localStorage.getItem("quady-api-key");
    if(!apiKey){
      setError("API 키를 먼저 설정해주세요. (상단 '🔑 AI API 키' 버튼)");
      return;
    }

    const newMessages=[...messages,{role:"user",content:userMsg}];
    setMessages(newMessages);
    setInput("");
    setLoading(true);
    setError("");

    try{
      const roadmapContext=`현재 로드맵 상태:
${roadmap.phases.map(p=>{
  const tasks=p.tasks||[];
  const completed=tasks.filter(t=>t.status==="completed").length;
  const avgProgress=tasks.length>0?Math.round(tasks.reduce((s,t)=>s+(t.progress||0),0)/tasks.length):0;
  return `Phase: ${p.name} (${p.period})
- 작업 ${completed}/${tasks.length} 완료 (진행률: ${avgProgress}%)
- 담당자: ${[...new Set(tasks.map(t=>t.assignee).filter(Boolean))].join(', ')||'미배정'}
- 마일스톤: ${p.milestone||'N/A'}`;
}).join('\n\n')}`;

      const systemPrompt=`당신은 QuadY 사업화 로드맵의 전문 AI 조언가입니다.

현재 프로젝트 상태:
${roadmapContext}

역할:
1. 프로젝트 진행 상황 분석 및 개선 제안
2. 타임라인 현실성 평가
3. 위험 요소 식별 및 해결책 제시
4. 팀 역할 할당 적절성 평가
5. 우선순위 최적화 제안

간결하고 실행 가능한 조언을 제시하세요.`;

      const response=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'x-api-key':apiKey,
          'anthropic-version':'2023-06-01',
          'content-type':'application/json',
          'anthropic-dangerous-direct-browser-access':'true',
        },
        body:JSON.stringify({
          model:'claude-3-haiku-20240307',
          max_tokens:1024,
          system:systemPrompt,
          messages:newMessages.map(m=>({role:m.role,content:m.content})),
        }),
      });

      if(!response.ok){
        const err=await response.json();
        throw new Error(err.error?.message||'채팅 요청 실패');
      }

      const data=await response.json();
      const aiResponse=data.content[0].text;
      setMessages(prev=>[...prev,{role:"assistant",content:aiResponse}]);
    }catch(err){
      console.error('AI Chat Error:',err);
      setError(err.message||'오류가 발생했습니다. API 키를 확인해주세요.');
      setMessages(newMessages.slice(0,-1));
    }finally{
      setLoading(false);
    }
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:1999,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(4px)"}} onClick={onClose}>
      <div style={{background:"white",borderRadius:16,width:"100%",maxWidth:600,maxHeight:"90vh",display:"flex",flexDirection:"column",boxShadow:"0 25px 50px rgba(0,0,0,.3)"}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{padding:"18px 24px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"linear-gradient(135deg,rgba(13,148,136,.08),rgba(37,99,235,.08))",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:24}}>🤖</span>
            <div>
              <h3 style={{margin:0,fontSize:16,fontWeight:700}}>AI 프로젝트 조언가</h3>
              <p style={{margin:"2px 0 0",fontSize:12,color:"var(--muted)"}}>로드맵 최적화 및 위험 분석</p>
            </div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:"var(--muted)"}}>×</button>
        </div>

        {/* Messages */}
        <div style={{flex:1,overflowY:"auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:12,background:"#FAFBFC"}}>
          {messages.length===0&&(
            <div style={{textAlign:"center",color:"var(--muted)",padding:"40px 20px",lineHeight:1.8}}>
              <div style={{fontSize:40,marginBottom:12}}>💬</div>
              <p style={{fontSize:15,marginBottom:16}}>로드맵에 대해 궁금한 점을 물어보세요!</p>
              <p style={{fontSize:13,color:"var(--border)",marginBottom:20}}>예: "현재 타임라인이 현실적인가?", "리스크가 뭐가 있을까?", "우선순위는 적절한가?"</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {[
                  "타임라인 현실성 평가",
                  "위험 요소 분석",
                  "우선순위 최적화",
                  "팀 배치 제안",
                ].map((q,i)=>(
                  <button key={i} disabled={loading} onClick={()=>sendMessage(q)}
                    style={{padding:"10px 12px",border:"1px solid var(--border)",borderRadius:8,background:"white",cursor:"pointer",fontSize:13,fontWeight:500,color:"var(--text2)",transition:"all .2s",opacity:loading?.5:1}}>
                    {q}
                  </button>
                ))}
              </div>
            </div>
          )}
          {messages.map((msg,i)=>(
            <div key={i} style={{display:"flex",flexDirection:"column",alignItems:msg.role==="user"?"flex-end":"flex-start"}}>
              <div style={{maxWidth:"85%",padding:"12px 14px",borderRadius:msg.role==="user"?"12px 12px 4px 12px":"12px 12px 12px 4px",background:msg.role==="user"?"#0D9488":"white",color:msg.role==="user"?"white":"var(--text)",fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word",border:msg.role==="assistant"?"1px solid var(--border)":"none",boxShadow:msg.role==="user"?"0 2px 6px rgba(13,148,136,.2)":"none"}}>
                {msg.content}
              </div>
            </div>
          ))}
          {loading&&(
            <div style={{display:"flex",alignItems:"flex-start"}}>
              <div style={{padding:"12px 14px",borderRadius:"12px 12px 12px 4px",background:"white",border:"1px solid var(--border)",fontSize:14,color:"var(--muted)",fontStyle:"italic"}}>
                ⏳ AI가 생각 중입니다...
              </div>
            </div>
          )}
          <div ref={chatEndRef}/>
        </div>

        {error&&(
          <div style={{padding:"12px 16px",background:"#FEE2E2",borderBottom:"1px solid var(--border)",color:"#991B1B",fontSize:13,fontWeight:500}}>
            ⚠️ {error}
          </div>
        )}

        {/* Input */}
        <div style={{padding:"12px 16px",borderTop:"1px solid var(--border)",display:"flex",gap:8,flexShrink:0,background:"white"}}>
          <textarea value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage(input);}}}
            placeholder="질문 입력... (Enter 전송)"
            style={{flex:1,resize:"none",border:"1px solid var(--border)",borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",minHeight:40,fontFamily:"inherit",lineHeight:1.5}}
          />
          <button onClick={()=>sendMessage(input)} disabled={loading||!input.trim()}
            style={{padding:"8px 16px",background:"var(--teal)",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,flexShrink:0,opacity:(loading||!input.trim())?.5:1,transition:"opacity .2s"}}>
            전송
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── WORKSPACE MODAL ─── */
function WorkspaceModal({task,phase,onClose,onOpenApiSettings}){
  const[docType,setDocType]=useState("report");
  const[aiMessages,setAiMessages]=useState([]);
  const[aiInput,setAiInput]=useState("");
  const[aiLoading,setAiLoading]=useState(false);
  const[savedFlash,setSavedFlash]=useState(false);
  const editorRef=useRef(null);
  const chatEndRef=useRef(null);
  const prevDocType=useRef(null);

  const wsKey=(dt)=>`quady-ws-${task.id}-${dt}`;

  // save current editor content before switching doc type
  const saveContent=(silent=false)=>{
    if(editorRef.current){
      localStorage.setItem(wsKey(docType),editorRef.current.innerHTML);
      if(!silent){setSavedFlash(true);setTimeout(()=>setSavedFlash(false),1500);}
    }
  };

  // load content when docType changes
  useEffect(()=>{
    if(prevDocType.current!==null) saveContent(true);
    prevDocType.current=docType;
    const stored=localStorage.getItem(wsKey(docType));
    if(editorRef.current){
      if(stored){editorRef.current.innerHTML=stored;}
      else{
        const dt=DOC_TYPES.find(d=>d.id===docType);
        editorRef.current.innerText=dt?dt.template:"";
      }
    }
  },[docType]);

  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:"smooth"});},[aiMessages]);

  const handleKeyDown=(e)=>{
    if((e.ctrlKey||e.metaKey)&&e.key==="s"){e.preventDefault();saveContent();}
  };

  const execCmd=(cmd,val=null)=>{document.execCommand(cmd,false,val);editorRef.current?.focus();};

  const insertAiResponse=(text)=>{
    if(editorRef.current){
      const p=document.createElement("p");
      p.innerText=text;
      editorRef.current.appendChild(p);
      editorRef.current.scrollTop=editorRef.current.scrollHeight;
      saveContent(true);
    }
  };

  const askAI=async(prompt)=>{
    const apiKey=localStorage.getItem("quady-api-key");
    if(!apiKey){onOpenApiSettings();return;}
    const userMsg=(prompt||aiInput).trim();
    if(!userMsg||aiLoading)return;
    setAiInput("");
    const newMsgs=[...aiMessages,{role:"user",content:userMsg}];
    setAiMessages(newMsgs);
    setAiLoading(true);
    try{
      const docText=editorRef.current?.innerText?.slice(0,600)||"";
      const sys=`당신은 QuadY AI 에듀테크 스타트업의 사업화 로드맵 전문 AI 어시스턴트입니다.
현재 작업: ${task.title}
Phase: ${phase.name} (${phase.period})
KPI: ${task.kpi||"미설정"}
세부 내용: ${(task.details||[]).join(", ")||"없음"}
현재 문서 내용 (앞부분): ${docText||"비어있음"}
한국어로 전문적이고 실질적인 답변을 제공하세요.`;
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-allow-browser":"true"},
        body:JSON.stringify({model:"claude-3-haiku-20240307",max_tokens:1024,system:sys,messages:newMsgs}),
      });
      if(!res.ok){const e=await res.json();throw new Error(e.error?.message||res.statusText);}
      const data=await res.json();
      setAiMessages([...newMsgs,{role:"assistant",content:data.content[0].text}]);
    }catch(e){
      setAiMessages([...newMsgs,{role:"assistant",content:`❌ 오류: ${e.message}`}]);
    }finally{setAiLoading(false);}
  };

  const QUICK=["작업 계획을 세워줘","보고서 초안 써줘","핵심 리스크는?","체크리스트 만들어줘"];

  return(
    <div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",background:"var(--bg)"}}>
      {/* LEFT SIDEBAR */}
      <div style={{width:190,background:"white",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",padding:"16px 10px",gap:4,flexShrink:0}}>

/* ─── AI 채팅 사이드바 (항상 표시 + 직접 실행) ─── */
function AIChatSidebar({roadmap,persist}){
  const[messages,setMessages]=useState([]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const[pending,setPending]=useState(null); // {commands, descriptions}
  const chatEndRef=useRef(null);

  useEffect(()=>{
    setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:"smooth"}),100);
  },[messages]);

  // AI 응답에서 <CMD>...</CMD> 명령 블록 추출
  const parseResponse=(text)=>{
    const match=text.match(/<CMD>([\s\S]*?)<\/CMD>/i);
    if(!match)return{cleanText:text,commands:[]};
    try{
      const cmdStr=match[1].trim();
      const commands=JSON.parse(cmdStr.startsWith('[')?cmdStr:`[${cmdStr}]`);
      const cleanText=text.replace(/<CMD>[\s\S]*?<\/CMD>/gi,'').trim();
      return{cleanText,commands};
    }catch{return{cleanText:text,commands:[]};}
  };

  // 명령을 사람이 읽기 쉬운 설명으로 변환
  const describeCmd=(cmd)=>{
    const phase=roadmap?.phases?.find(p=>p.id===cmd.phaseId);
    const task=phase?.tasks?.find(t=>t.id===cmd.taskId);
    const statusLabel={'not-started':'시작 전','in-progress':'진행 중','completed':'완료','blocked':'보류'};
    const fieldLabel={status:'상태',progress:'진행률',assignee:'담당자',priority:'우선순위',title:'제목'};
    if(cmd.action==='update_task'){
      const val=cmd.field==='status'?(statusLabel[cmd.value]||cmd.value):cmd.field==='progress'?`${cmd.value}%`:cmd.value;
      return `📝 "${task?.title||cmd.taskId}" ${fieldLabel[cmd.field]||cmd.field} → ${val}`;
    }
    if(cmd.action==='add_task'){
      return `➕ [${phase?.name||cmd.phaseId}] 새 작업: "${cmd.title}"${cmd.assignee?` (담당: ${cmd.assignee})`:''}`;
    }
    if(cmd.action==='update_phase'){
      return `📋 [${phase?.name||cmd.phaseId}] ${fieldLabel[cmd.field]||cmd.field} → ${cmd.value}`;
    }
    return JSON.stringify(cmd);
  };

  // 명령 실행하여 로드맵 반영
  const applyCommands=(commands)=>{
    if(!roadmap||!persist)return;
    let updated=JSON.parse(JSON.stringify(roadmap));
    for(const cmd of commands){
      if(cmd.action==='update_task'){
        updated.phases=updated.phases.map(p=>p.id===cmd.phaseId?{...p,tasks:p.tasks.map(t=>t.id===cmd.taskId?{...t,[cmd.field]:cmd.value}:t)}:p);
      }else if(cmd.action==='add_task'){
        updated.phases=updated.phases.map(p=>p.id===cmd.phaseId?{...p,tasks:[...p.tasks,{
          id:`t-${Date.now()}-${Math.random().toString(36).substr(2,4)}`,
          title:cmd.title,status:cmd.status||'not-started',progress:cmd.progress||0,
          priority:cmd.priority||'medium',assignee:cmd.assignee||'',
          startMonth:cmd.startMonth||1,endMonth:cmd.endMonth||2,
          deadline:'',kpi:'',details:[],checklist:[],comments:[],deps:[]
        }]}:p);
      }else if(cmd.action==='update_phase'){
        updated.phases=updated.phases.map(p=>p.id===cmd.phaseId?{...p,[cmd.field]:cmd.value}:p);
      }
    }
    persist(updated);
    setPending(null);
    setMessages(prev=>[...prev,{role:'system',content:`✅ ${commands.length}개 항목이 로드맵에 반영되었습니다.`}]);
  };

  const sendMessage=async(userMsg)=>{
    const msg=(userMsg||input).trim();
    if(!msg||loading)return;
    const apiKey=localStorage.getItem("quady-api-key");
    if(!apiKey){setError("상단 '🔑 AI API 키'에서 API 키를 먼저 설정해주세요.");return;}
    const newMsgs=[...messages.filter(m=>m.role!=='system'),{role:"user",content:msg}];
    setMessages(prev=>[...prev,{role:"user",content:msg}]);
    setInput("");
    setLoading(true);
    setError("");
    setPending(null);
    try{
      // 로드맵 전체 구조(ID 포함) 시스템 프롬프트에 전달
      const ctx=roadmap?roadmap.phases.map(p=>{
        const tasks=p.tasks||[];
        return `[Phase ID: ${p.id}] ${p.name} (${p.period||''})\n`+
          tasks.map(t=>`  - [Task ID: ${t.id}] ${t.title} | 상태: ${t.status} | 진행률: ${t.progress}% | 담당: ${t.assignee||'미배정'}`).join('\n');
      }).join('\n\n'):'로드맵 없음';

      const systemPrompt=`당신은 QuadY 사업화 로드맵 AI 조언가입니다. 분석/조언 뿐 아니라 사용자 요청 시 로드맵을 직접 수정할 수 있습니다.

현재 로드맵:
${ctx}

=== 로드맵 수정 요청 시 응답 형식 ===
텍스트 답변 후 아래 형식으로 명령을 추가하세요:

<CMD>
[
  {"action":"update_task","phaseId":"실제ID","taskId":"실제ID","field":"status","value":"completed"},
  {"action":"update_task","phaseId":"실제ID","taskId":"실제ID","field":"progress","value":80},
  {"action":"add_task","phaseId":"실제ID","title":"작업명","assignee":"담당자","startMonth":1,"endMonth":2,"priority":"high"},
  {"action":"update_phase","phaseId":"실제ID","field":"milestone","value":"새 마일스톤"}
]
</CMD>

가능한 field 값: status(not-started/in-progress/completed/blocked), progress(0~100), assignee(이름), priority(high/medium/low), title
수정 요청이 아닌 일반 질문은 CMD 블록 없이 텍스트만 답변하세요.`;

      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'x-api-key':apiKey,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({
          model:'claude-3-haiku-20240307',
          max_tokens:1500,
          system:systemPrompt,
          messages:newMsgs.map(m=>({role:m.role,content:m.content})),
        }),
      });
      if(!res.ok){const e=await res.json();throw new Error(e.error?.message||'요청 실패');}
      const data=await res.json();
      const rawText=data.content[0].text;
      const{cleanText,commands}=parseResponse(rawText);
      setMessages(prev=>[...prev,{role:"assistant",content:cleanText}]);
      if(commands.length>0){
        setPending({commands,descriptions:commands.map(describeCmd)});
      }
    }catch(err){
      setError(err.message||'오류가 발생했습니다.');
    }finally{setLoading(false);}
  };

  return(
    <div style={{width:340,flexShrink:0,display:"flex",flexDirection:"column",height:"100vh",background:"white",borderLeft:"2px solid var(--border)",overflow:"hidden"}}>
      {/* 헤더 */}
      <div style={{padding:"14px 16px",background:"linear-gradient(135deg,rgba(13,148,136,.1),rgba(37,99,235,.1))",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <span style={{fontSize:22}}>🤖</span>
        <div style={{flex:1}}>
          <p style={{margin:0,fontSize:14,fontWeight:700,color:"var(--text)"}}>AI 조언가</p>
          <p style={{margin:"2px 0 0",fontSize:11,color:"var(--muted)"}}>분석 · 조언 · 직접 실행</p>
        </div>
        {messages.length>0&&<button onClick={()=>{setMessages([]);setPending(null);}} style={{background:"none",border:"none",fontSize:12,color:"var(--muted)",cursor:"pointer",padding:"2px 6px",borderRadius:4}}>초기화</button>}
      </div>

      {/* 메시지 영역 */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 12px",display:"flex",flexDirection:"column",gap:10,background:"#FAFBFC"}}>
        {messages.length===0&&(
          <div style={{textAlign:"center",color:"var(--muted)",padding:"24px 12px",lineHeight:1.8}}>
            <div style={{fontSize:32,marginBottom:8}}>🤖</div>
            <p style={{fontSize:13,fontWeight:600,color:"var(--text)",marginBottom:4}}>AI 조언가</p>
            <p style={{fontSize:12,marginBottom:16}}>질문하거나 작업을 시켜보세요!</p>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {[
                {label:"📊 타임라인 현실성 평가",q:"타임라인 현실성 평가"},
                {label:"⚠️ 위험 요소 분석",q:"위험 요소 분석"},
                {label:"✅ 완료된 작업 표시",q:"완료된 작업들을 완료 상태로 바꿔줘"},
                {label:"➕ 작업 추가 제안",q:"현재 로드맵에 부족한 작업을 추가해줘"},
              ].map((item,i)=>(
                <button key={i} onClick={()=>sendMessage(item.q)} disabled={loading}
                  style={{padding:"8px 10px",border:"1px solid var(--border)",borderRadius:8,background:"white",cursor:"pointer",fontSize:12,fontWeight:500,color:"var(--text2)",textAlign:"left"}}>
                  {item.label}
                </button>
              ))}
            </div>
          </div>
        )}
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",flexDirection:"column",alignItems:m.role==="user"?"flex-end":m.role==="system"?"center":"flex-start"}}>
            {m.role==="system"?(
              <div style={{padding:"6px 12px",background:"#D1FAE5",borderRadius:20,fontSize:12,color:"#065F46",fontWeight:600}}>{m.content}</div>
            ):(
              <div style={{maxWidth:"88%",padding:"10px 12px",borderRadius:m.role==="user"?"12px 12px 3px 12px":"12px 12px 12px 3px",background:m.role==="user"?"#0D9488":"white",color:m.role==="user"?"white":"var(--text)",fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word",border:m.role==="assistant"?"1px solid var(--border)":"none",boxShadow:m.role==="user"?"0 2px 6px rgba(13,148,136,.2)":"none"}}>
                {m.content}
              </div>
            )}
          </div>
        ))}
        {loading&&<div style={{display:"flex",alignItems:"flex-start"}}><div style={{padding:"10px 12px",borderRadius:"12px 12px 12px 3px",background:"white",border:"1px solid var(--border)",fontSize:13,color:"var(--muted)",fontStyle:"italic"}}>⏳ 생각 중...</div></div>}
        {error&&<div style={{padding:"10px 12px",background:"#FEE2E2",borderRadius:8,color:"#991B1B",fontSize:12}}>{error}</div>}

        {/* 실행 대기 명령 확인 카드 */}
        {pending&&(
          <div style={{background:"white",border:"2px solid #0D9488",borderRadius:10,padding:"12px",boxShadow:"0 4px 12px rgba(13,148,136,.15)"}}>
            <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:"#0D9488"}}>🔧 로드맵 변경 준비됨</p>
            <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:10}}>
              {pending.descriptions.map((d,i)=>(
                <p key={i} style={{margin:0,fontSize:12,color:"var(--text2)",lineHeight:1.5}}>{d}</p>
              ))}
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>applyCommands(pending.commands)}
                style={{flex:1,padding:"7px",background:"#0D9488",color:"white",border:"none",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:700}}>
                ✅ 로드맵에 적용
              </button>
              <button onClick={()=>setPending(null)}
                style={{padding:"7px 10px",background:"var(--surface2)",color:"var(--text2)",border:"1px solid var(--border)",borderRadius:7,cursor:"pointer",fontSize:12}}>
                취소
              </button>
            </div>
          </div>
        )}
        <div ref={chatEndRef}/>
      </div>

      {/* 입력 영역 */}
      <div style={{padding:"10px 12px",borderTop:"1px solid var(--border)",display:"flex",gap:6,flexShrink:0,background:"white"}}>
        <textarea value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}}
          placeholder="질문하거나 작업 지시... (Enter 전송)"
          style={{flex:1,resize:"none",border:"1px solid var(--border)",borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",minHeight:38,maxHeight:80,fontFamily:"inherit",lineHeight:1.5}}
        />
        <button onClick={()=>sendMessage()} disabled={loading||!input.trim()}
          style={{padding:"8px 14px",background:"var(--teal)",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,flexShrink:0,opacity:(loading||!input.trim())?.5:1,alignSelf:"flex-end"}}>
          전송
        </button>
      </div>
    </div>
  );
}

    }catch{setRoadmap(INIT);}
  },[]);

  const persist=useCallback((updated)=>{
    setSaving(true);
    const r={...updated,lastUpdated:new Date().toISOString().split("T")[0]};
    setRoadmap(r);
    try{localStorage.setItem("quady-roadmap-v5",JSON.stringify(r));}catch{}
    setTimeout(()=>setSaving(false),600);
  },[]);

  const saveTask=(task,phaseId)=>persist({...roadmap,phases:roadmap.phases.map(p=>p.id===phaseId?{...p,tasks:p.tasks.map(t=>t.id===task.id?task:t)}:p)});
  const moveTask=(taskId,from,to)=>{
    if(from===to)return;
    let mt;
    const up={...roadmap,phases:roadmap.phases.map(p=>{
      if(p.id===from){mt=p.tasks.find(t=>t.id===taskId);return{...p,tasks:p.tasks.filter(t=>t.id!==taskId)};}
      return p;
    })};
    up.phases=up.phases.map(p=>p.id===to?{...p,tasks:[...p.tasks,mt]}:p);
    persist(up);
  };
  const deleteTask=(taskId,phaseId)=>persist({...roadmap,phases:roadmap.phases.map(p=>p.id===phaseId?{...p,tasks:p.tasks.filter(t=>t.id!==taskId)}:p)});
  const addTask=(phaseId,title,sm,em)=>{
    if(!title)return;
    persist({...roadmap,phases:roadmap.phases.map(p=>p.id===phaseId?{...p,tasks:[...p.tasks,{id:`t-${Date.now()}`,title,status:"not-started",progress:0,priority:"medium",assignee:"",startMonth:sm,endMonth:em,deadline:"",kpi:"",details:[],checklist:[],comments:[],deps:[]}]}:p)});
  };
  const savePhase=(phase)=>{
    const exists=roadmap.phases.some(p=>p.id===phase.id);
    persist(exists?{...roadmap,phases:roadmap.phases.map(p=>p.id===phase.id?{...phase,tasks:p.tasks}:p)}:{...roadmap,phases:[...roadmap.phases,phase]});
  };
  const deletePhase=(phaseId)=>{persist({...roadmap,phases:roadmap.phases.filter(p=>p.id!==phaseId)});if(activePhase===phaseId)setActivePhase(null);};

  const reorderTask=(phaseId,taskId,dir)=>{
    persist({...roadmap,phases:roadmap.phases.map(p=>{
      if(p.id!==phaseId)return p;
      const idx=p.tasks.findIndex(t=>t.id===taskId);
      if(idx<0)return p;
      const ni=idx+dir;
      if(ni<0||ni>=p.tasks.length)return p;
      const tasks=[...p.tasks];
      [tasks[idx],tasks[ni]]=[tasks[ni],tasks[idx]];
      return{...p,tasks};
    })});
  };

  const reorderPhase=(phaseId,dir)=>{
    const idx=roadmap.phases.findIndex(p=>p.id===phaseId);
    if(idx<0)return;
    const ni=idx+dir;
    if(ni<0||ni>=roadmap.phases.length)return;
    const phases=[...roadmap.phases];
    [phases[idx],phases[ni]]=[phases[ni],phases[idx]];
    persist({...roadmap,phases});
  };

  const totalProg=useMemo(()=>{
    if(!roadmap)return 0;
    const a=roadmap.phases.flatMap(p=>p.tasks);
    if(!a.length)return 0;
    return Math.round(a.reduce((s,t)=>s+(t.progress||0),0)/a.length);
  },[roadmap]);

  if(!roadmap)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"var(--muted)",fontSize:16,fontWeight:500}}>로딩 중...</div>;

  const VIEWS=[
    {k:"timeline",l:"📅 타임라인"},
    {k:"detail",l:"📋 상세 보기"},
    {k:"dashboard",l:"📊 대시보드"},
    {k:"kpi",l:"🎯 KPI 추적"},
    {k:"meetings",l:"📝 회의록"},
  ];

  return(
    <div style={{height:"100vh",width:"100%",display:"flex",flexDirection:"row",overflow:"hidden"}}>

      {/* ─── LEFT: 메인 로드맵 영역 ─── */}
      <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",overflow:"hidden",background:"var(--bg)"}}>
        <Header roadmap={roadmap} totalProg={totalProg} saving={saving} onAddPhase={()=>setNewPhase(true)} onOpenApiSettings={()=>setShowApiSettings(true)} onOpenAiChat={()=>setShowAiChat(true)}/>

        {/* NAV */}
        <div style={{background:"white",borderBottom:"1px solid var(--border)",flexShrink:0,boxShadow:"0 2px 8px rgba(13,20,36,.05)"}}>
          <div style={{padding:"0 12px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"nowrap",gap:4}}>
              <div style={{display:"flex",alignItems:"center",gap:1,flexShrink:0}}>
                {VIEWS.map(v=>(
                  <button key={v.k} onClick={()=>{setView(v.k);if(v.k==="detail"&&!activePhase&&roadmap.phases.length)setActivePhase(roadmap.phases[0].id);}}
                    style={{padding:"11px 11px",background:view===v.k?"var(--surface3)":"none",border:"none",borderBottom:view===v.k?"2.5px solid var(--teal)":"2.5px solid transparent",borderRadius:"0",cursor:"pointer",fontSize:13,fontWeight:view===v.k?700:500,color:view===v.k?"var(--teal)":"var(--text2)",transition:"all .18s",whiteSpace:"nowrap"}}>
                    {v.l}
                  </button>
                ))}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                {view==="timeline"&&(
                  <div style={{display:"flex",alignItems:"center",gap:2,background:"var(--surface2)",borderRadius:8,padding:"3px",border:"1px solid var(--border)"}}>
                    {Object.entries(ZOOMS).map(([k,c])=>(
                      <button key={k} onClick={()=>setZoom(k)} style={{padding:"4px 10px",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:700,background:zoom===k?"white":"transparent",color:zoom===k?"var(--teal)":"var(--muted)",boxShadow:zoom===k?"var(--shadow-sm)":"none",transition:"all .18s"}}>
                        {c.label}
                      </button>
                    ))}
                  </div>
                )}
                {(view==="detail"||view==="dashboard")&&(
                  <>
                    <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="검색..." className="inp" style={{maxWidth:140,fontSize:13,padding:"5px 8px"}}/>
                    <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} className="inp" style={{maxWidth:110,fontSize:13,padding:"5px 8px"}}>
                      <option value="all">상태: 모두</option>
                      {Object.entries(STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                    </select>
                    <select value={filterPriority} onChange={e=>setFilterPriority(e.target.value)} className="inp" style={{maxWidth:110,fontSize:13,padding:"5px 8px"}}>
                      <option value="all">우선순위: 모두</option>
                      {Object.entries(PRIORITY).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                    </select>
                  </>
                )}
              </div>
            </div>
          </div>
        </div>

        {/* VIEWS */}
        <div style={{flex:1,overflow:view==="meetings"?"hidden":"auto",display:"flex",flexDirection:"column"}}>
          {view==="timeline"&&<TimelineView roadmap={roadmap} zoom={zoom} onEditTask={setEditTask} onEditPhase={setEditPhase} onAddTask={addTask}/>}
          {view==="detail"&&<DetailView roadmap={roadmap} activePhase={activePhase} setActivePhase={setActivePhase} onEditTask={setEditTask} onEditPhase={setEditPhase} filterStatus={filterStatus} filterPriority={filterPriority} searchQuery={searchQuery} onAddTask={addTask} onOpenWorkspace={setWorkspaceTask} onReorderTask={reorderTask} onReorderPhase={reorderPhase}/>}
          {view==="dashboard"&&<DashboardView roadmap={roadmap} totalProg={totalProg} onEditTask={setEditTask} setView={setView} setActivePhase={setActivePhase} filterStatus={filterStatus}/>}
          {view==="kpi"&&<KPIView roadmap={roadmap}/>}
          {view==="meetings"&&<MeetingView roadmap={roadmap}/>}
        </div>
      </div>

      {/* ─── RIGHT: AI 채팅 사이드바 (항상 표시) ─── */}
      <AIChatSidebar roadmap={roadmap} persist={persist}/>

      {/* MODALS (position:fixed → 레이아웃 무관하게 최상위 렌더링) */}
      {editTask&&<TaskModal task={editTask.task} phase={editTask.phase} phases={roadmap.phases} onSave={saveTask} onMove={moveTask} onDelete={deleteTask} onClose={()=>setEditTask(null)}/>}
      {editPhase&&<PhaseModal phase={editPhase} onSave={savePhase} onDelete={deletePhase} onClose={()=>setEditPhase(null)}/>}
      {newPhase&&<PhaseModal isNew onSave={savePhase} onDelete={()=>{}} onClose={()=>setNewPhase(false)}/>}
      {workspaceTask&&<WorkspaceModal task={workspaceTask.task} phase={workspaceTask.phase} onClose={()=>setWorkspaceTask(null)} onOpenApiSettings={()=>setShowApiSettings(true)}/>}
      {showApiSettings&&<APISettingsModal onClose={()=>setShowApiSettings(false)}/>}
    </div>
  );
}

// ===== REACT 렌더링 =====
const rootEl=document.getElementById("root");
if(rootEl){
  const root=ReactDOM.createRoot(rootEl);
  root.render(<QuadYRoadmap/>);
}
  </script>
</body>
</html>
